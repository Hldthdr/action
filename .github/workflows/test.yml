name: Deploy Project
on: push
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Get code
        uses: actions/checkout@v3
        with:
          node-version: '18'
      - name: Install dependencies
        run: npm ci
        working-directory: ./02 Starting Project
      - name: Run tests
        run: npm test
        working-directory: ./02 Starting Project
  deploy:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Get code
        uses: actions/checkout@v3
        with:
          node-version: '18'
      - name: Install dependencies
        run: npm ci
        working-directory: ./02 Starting Project
      - name: Build project
        run: npm run build
        working-directory: ./02 Starting Project
      - name: Deploy to GitHub Pages
        run: echo "Deploying to GitHub Pages..."